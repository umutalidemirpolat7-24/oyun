<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pause Challenge</title>
<style>
body {
  margin:0;
  overflow:hidden;
  background: linear-gradient(#87CEEB, #c2b280);
}

#car {
  position:absolute;
  font-size:50px;
}

#target {
  position:absolute;
  border:3px solid lime;
  width:120px;
  height:80px;
}

#text {
  position:absolute;
  top:20px;
  width:100%;
  text-align:center;
  font-size:24px;
  color:white;
}
</style>
</head>

<body>

<div id="text">Tap to pause!</div>
<div id="car">🚗</div>
<div id="target"></div>

<script>
let car = document.getElementById("car");
let target = document.getElementById("target");
let text = document.getElementById("text");

let x = -100;
let y = 200;
let vx = 6;
let vy = -10;
let gravity = 0.5;

let running = true;

// hedef random
let targetX = Math.random() * (window.innerWidth - 150) + 50;
let targetY = Math.random() * 200 + 100;

target.style.left = targetX + "px";
target.style.top = targetY + "px";

function loop() {
  if (running) {
    x += vx;
    y += vy;
    vy += gravity;

    car.style.left = x + "px";
    car.style.top = y + "px";
  }
  requestAnimationFrame(loop);
}

function pauseGame() {
  if (!running) return;

  running = false;

  let carRect = car.getBoundingClientRect();
  let targetRect = target.getBoundingClientRect();

  if (
    carRect.left > targetRect.left &&
    carRect.right < targetRect.right &&
    carRect.top > targetRect.top &&
    carRect.bottom < targetRect.bottom
  ) {
    text.innerText = "PERFECT 🔥";
  } else {
    text.innerText = "FAIL ❌";
  }

  setTimeout(reset, 1200);
}

function reset() {
  x = -100;
  y = 200;
  vx = 6 + Math.random()*2;
  vy = -10;
  running = true;
  text.innerText = "Tap to pause!";

  targetX = Math.random() * (window.innerWidth - 150) + 50;
  targetY = Math.random() * 200 + 100;

  target.style.left = targetX + "px";
  target.style.top = targetY + "px";
}

document.addEventListener("click", pauseGame);

loop();
</script>

</body>
</html>
